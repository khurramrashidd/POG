<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimagiFy | Proof-of-Generation (PoG)</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">

    <header>
        <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
            <i class="fa-solid fa-sun" id="themeIcon"></i>
        </button>
        <h1><i class="fa-solid fa-shield-halved"></i> Proof-of-Generation</h1>
        <p>From Assumed Trust to Verifiable Trust in IoT Networks</p>
    </header>

    <div class="container">
        <div class="card before-card">
            <h2><i class="fa-solid fa-triangle-exclamation"></i> Traditional System</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Blindly accepts data without cryptographic verification.</p>

            <div class="control-group">
                <select id="beforeSource">
                    <option value="iot">📡 IoT Sensor Stream</option>
                    <option value="user">👤 Manual Input</option>
                </select>
                <button onclick="loadBeforeData()"><i class="fa-solid fa-download"></i> Fetch</button>
            </div>

            <textarea id="beforeData" placeholder="Raw sensor data will appear here..."></textarea>
            
            <div class="tamper-hint">
                <span><i class="fa-solid fa-pen-to-square"></i> Editable (Try tampering)</span>
            </div>

            <button onclick="sendBefore()" style="width: 100%; background: var(--danger);">
                <i class="fa-solid fa-server"></i> Submit Data
            </button>

            <div id="beforeStatus" class="status-box"></div>
        </div>

        <div class="card after-card">
            <h2><i class="fa-solid fa-circle-check"></i> PoG Framework</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Cryptographically verifies provenance using Blockchain & ZKP.</p>

            <div class="control-group">
                <select id="afterSource">
                    <option value="iot">📡 IoT Sensor Stream</option>
                    <option value="user">👤 Manual Input</option>
                </select>
                <button onclick="loadAfterData()"><i class="fa-solid fa-download"></i> Fetch</button>
            </div>

            <textarea id="afterData" placeholder="Raw sensor data will appear here..."></textarea>

            <div class="tamper-hint">
                <span><i class="fa-solid fa-pen-to-square"></i> Editable (Try tampering)</span>
            </div>

            <div class="control-group">
                <button onclick="generate()" style="flex: 1;"><i class="fa-solid fa-link"></i> Generate Proof</button>
                <button onclick="verify()" class="secondary" style="flex: 1;"><i class="fa-solid fa-microchip"></i> Verify Data</button>
            </div>

            <div id="hashContainer" class="hash-container">
                <strong style="color: var(--success);"><i class="fa-solid fa-key"></i> PoG Hash:</strong><br>
                <span id="hashDisplay"></span>
            </div>

            <div id="afterStatus" class="status-box"></div>
        </div>
    </div>

    <script>
        // Light/Dark Mode Toggle Logic
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fa-solid fa-moon';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fa-solid fa-sun';
            }
        }

        const showStatus = (elementId, message, type) => {
            const el = document.getElementById(elementId);
            el.innerHTML = message;
            el.className = `status-box visible status-${type}`;
        };

        const hideStatus = (elementId) => {
            document.getElementById(elementId).classList.remove('visible');
        };

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function loadBeforeData() {
            let source = document.getElementById('beforeSource').value;
            if (source === "iot") {
                let res = await fetch('/iot_data');
                let result = await res.json();
                document.getElementById('beforeData').value = result.data;
                hideStatus('beforeStatus');
            } else {
                document.getElementById('beforeData').value = "";
            }
        }

        async function loadAfterData() {
            let source = document.getElementById('afterSource').value;
            if (source === "iot") {
                let res = await fetch('/iot_data');
                let result = await res.json();
                document.getElementById('afterData').value = result.data;
                hideStatus('afterStatus');
                document.getElementById('hashContainer').style.display = 'none';
            } else {
                document.getElementById('afterData').value = "";
            }
        }

        async function sendBefore() {
            let data = document.getElementById('beforeData').value;
            if(!data) return;
            
            showStatus('beforeStatus', '<i class="fa-solid fa-circle-notch spinner"></i> Processing...', 'danger');
            await delay(600); 

            let res = await fetch('/before', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data})
            });

            await res.json();
            showStatus('beforeStatus', '<i class="fa-solid fa-triangle-exclamation"></i> Accepted Without Verification', 'danger');
        }

        async function generate() {
            let data = document.getElementById('afterData').value;
            if(!data) return;

            showStatus('afterStatus', '<i class="fa-solid fa-circle-notch spinner"></i> Generating ZKP & Cryptographic Hash...', 'success');
            await delay(1200); 

            let res = await fetch('/after_generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data})
            });

            let result = await res.json();
            
            document.getElementById('hashContainer').style.display = 'block';
            document.getElementById('hashDisplay').innerText = result.hash;
            showStatus('afterStatus', '<i class="fa-solid fa-link"></i> Proof Secured on Blockchain', 'success');
        }

        async function verify() {
            let data = document.getElementById('afterData').value;
            if(!data) return;

            showStatus('afterStatus', '<i class="fa-solid fa-circle-notch spinner"></i> Auditing Blockchain Ledger...', 'success');
            await delay(1000); 

            let res = await fetch('/after_verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data})
            });

            let result = await res.json();
            
            if (result.status === "verified") {
                showStatus('afterStatus', '<i class="fa-solid fa-shield-check"></i> ✅ Verified: Provenance Authentic', 'success');
            } else {
                showStatus('afterStatus', '<i class="fa-solid fa-shield-xmark"></i> ❌ Tamper Detected: Data Modified!', 'danger');
            }
        }
    </script>
</body>
</html>
